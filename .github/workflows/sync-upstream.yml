name: Auto Sync Upstream and Resolve Conflicts

on:
  schedule:
    - cron: '0 0,18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_WRITE || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/danny-avila/LibreChat.git || echo "Remote upstream already exists."
          git fetch upstream main

      - name: Attempt Merge
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "Merge successful without conflicts."
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          else
            echo "Conflicts detected!"
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
          fi

      - name: Resolve conflicts using AI (Multi-Provider Fallback)
        if: steps.merge.outputs.has_conflicts == 'true'
        env:
          BLTCY_PROXY_URL: ${{ secrets.BLTCY_PROXY_URL }}
          BLTCY_API_KEY: ${{ secrets.BLTCY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: node .github/scripts/resolve-conflicts.js

      - name: Commit resolved conflicts
        if: steps.merge.outputs.has_conflicts == 'true'
        run: |
          # If AI failed to resolve some conflicts, this might fail, which is expected
          # to prevent committing broken files with markers.
          git commit -m "chore: auto-resolve merge conflicts with upstream using multi-provider AI"
      
      - name: Push changes
        run: git push origin HEAD:main
