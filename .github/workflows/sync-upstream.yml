name: Auto Sync Upstream and Resolve Conflicts

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_WRITE || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/danny-avila/LibreChat.git || echo "Remote upstream already exists."
          git fetch upstream main

      - name: Track 1 - Attempt direct merge
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "Merge successful without conflicts."
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          else
            echo "Conflicts detected!"
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
          fi

      - name: Track 2 - Resolve conflicts using AI (Multi-Provider Fallback)
        id: ai_resolve
        if: steps.merge.outputs.has_conflicts == 'true'
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
        run: node .github/scripts/resolve-conflicts.js

      - name: Track 2 - Commit resolved conflicts
        id: commit_ai
        if: steps.merge.outputs.has_conflicts == 'true' && steps.ai_resolve.outcome == 'success'
        run: |
          git commit -m "chore: auto-resolve merge conflicts with upstream using multi-provider AI" || echo "Nothing to commit"

      - name: Track 3 - Abort merge and reset on AI failure
        if: steps.merge.outputs.has_conflicts == 'true' && steps.ai_resolve.outcome == 'failure'
        run: |
          echo "AI conflict resolution failed. Aborting merge to keep repo clean."
          git merge --abort 2>/dev/null || true
          git reset --hard HEAD 2>/dev/null || true
          echo "ai_failed=true" >> $GITHUB_OUTPUT

      - name: Push changes
        id: push
        if: steps.merge.outputs.has_conflicts == 'false' || (steps.ai_resolve.outcome == 'success' && steps.commit_ai.outcome == 'success')
        run: |
          if git diff --quiet HEAD origin/main; then
            echo "No changes to push."
          else
            git push origin HEAD:main
          fi

      - name: Create issue on sync failure
        if: failure() || (steps.merge.outputs.has_conflicts == 'true' && steps.ai_resolve.outcome == 'failure')
        env:
          GH_TOKEN: ${{ secrets.ACTION_WRITE || github.token }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/create-sync-issue.js
