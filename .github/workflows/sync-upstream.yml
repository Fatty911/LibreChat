name: Sync upstream

on:
  schedule:
    - cron: '*/10 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_WRITE }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/danny-avila/LibreChat.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check if merge is needed
        id: check
        run: |
          current=$(git rev-parse HEAD)
          upstream=$(git rev-parse upstream/main)
          if [ "$current" != "$upstream" ]; then
            echo "need_sync=true" >> $GITHUB_OUTPUT
          else
            echo "need_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.need_sync == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge upstream
        if: steps.check.outputs.need_sync == 'true'
        env:
          BLTCY_PROXY_URL: ${{ secrets.BLTCY_PROXY_URL }}
          BLTCY_API_KEY: ${{ secrets.BLTCY_API_KEY }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          
          if git merge upstream/main --no-edit; then
            echo "Merge successful without conflicts"
          else
            echo "Conflicts detected, resolving with AI..."
            node .github/scripts/resolve-conflicts.js
            git commit -m "chore: auto-resolve merge conflicts with AI"
          fi
          
          git push origin HEAD:main
