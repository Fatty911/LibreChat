name: Auto Sync Upstream and Resolve Conflicts

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_WRITE || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/danny-avila/LibreChat.git || echo "Remote upstream already exists."
          git fetch upstream main

      - name: Attempt direct merge
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          else
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
          fi

      - name: Resolve conflicts using AI
        id: ai_resolve
        if: steps.merge.outputs.has_conflicts == 'true'
        env:
          BLTCY_PROXY_URL: ${{ secrets.BLTCY_PROXY_URL }}
          BLTCY_API_KEY: ${{ secrets.BLTCY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
        run: node .github/scripts/resolve-conflicts.js

      - name: Commit resolved merge
        if: steps.merge.outputs.has_conflicts == 'true' && steps.ai_resolve.outcome == 'success'
        run: |
          git commit -m "chore: sync upstream + auto-resolve conflicts via AI" || echo "Nothing to commit"

      - name: Push changes
        if: steps.merge.outputs.has_conflicts == 'false' || steps.ai_resolve.outcome == 'success'
        run: |
          if git diff --quiet HEAD origin/main; then
            echo "No changes to push."
          else
            git push origin HEAD:main
          fi
