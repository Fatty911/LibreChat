name: Auto Sync Upstream and Resolve Conflicts

on:
  schedule:
    - cron: '0 0,18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_WRITE || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/danny-avila/LibreChat.git || echo "Remote upstream already exists."
          git fetch upstream main

      - name: Attempt Merge
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "Merge successful without conflicts."
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          else
            echo "Conflicts detected!"
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
          fi

      - name: Resolve conflicts using LLM
        if: steps.merge.outputs.has_conflicts == 'true'
        env:
          BLTCY_PROXY_URL: ${{ secrets.BLTCY_PROXY_URL }}
          BLTCY_API_KEY: ${{ secrets.BLTCY_API_KEY }}
        run: node .github/scripts/resolve-conflicts.js

      - name: Commit resolved conflicts
        if: steps.merge.outputs.has_conflicts == 'true'
        run: |
          git diff --name-only --diff-filter=U | xargs -r git add
          # the script already does `git add`, but doing it again here is safe
          git commit -m "chore: auto-resolve merge conflicts with upstream using BLTCY API"
      
      - name: Push changes
        run: git push origin HEAD:main
